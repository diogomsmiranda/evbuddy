[project]
name = "evbuddy"
version = "0.1.0"
description = ""
authors = [
    {name = "Diogo Miranda",email = "diogomsmiranda@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas (>=3.0.0,<4.0.0)",
    "matplotlib (>=3.10.8,<4.0.0)",
    "seaborn (>=0.13.2,<0.14.0)",
    "scikit-learn (>=1.8.0,<2.0.0)",
    "numpy (>=2.4.2,<3.0.0)",
    "pyarrow (>=23.0.1,<24.0.0)",
    "xgboost (>=3.2.0,<4.0.0)"
