name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_BIN: /home/igo/.pyenv/shims/python3.12

jobs:
  unit-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Syntax check
        run: |
          poetry run python -m compileall src tests

      - name: Run tests
        run: |
          poetry run pytest -v
