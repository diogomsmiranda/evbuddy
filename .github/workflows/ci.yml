name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_BIN: /home/igo/.pyenv/shims/python3.12

jobs:
  unit-tests:
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version

      - name: Install Poetry
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip poetry

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Syntax check
        run: poetry run python -m compileall src tests

      - name: Run tests
        run: poetry run pytest -v
