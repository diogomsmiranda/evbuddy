name: dvc

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_train_models:
        description: "Run full train_models stage after visualisation"
        required: false
        default: false
        type: boolean
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

env:
  PYTHON_BIN: /home/igo/.pyenv/shims/python3.12
  DVC_REMOTE_URL: /srv/dvc/evbuddy
  MLFLOW_TRACKING_URI: http://127.0.0.1:5000

jobs:
  changes:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    outputs:
      visualisation: ${{ github.event_name == 'pull_request' && steps.filter.outputs.visualisation || steps.defaults.outputs.visualisation }}
      train_models: ${{ github.event_name == 'pull_request' && steps.filter.outputs.train_models || steps.defaults.outputs.train_models }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Detect changed paths (PR)
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            visualisation:
              - 'src/data/**'
              - 'src/features/**'
              - 'src/visualisation/**'
              - 'src/utils/**'
              - 'dvc.yaml'
              - 'dvc.lock'
              - 'pyproject.toml'
              - 'poetry.lock'
            train_models:
              - 'src/data/**'
              - 'src/features/**'
              - 'src/models/**'
              - 'src/utils/**'
              - 'dvc.yaml'
              - 'dvc.lock'
              - 'pyproject.toml'
              - 'poetry.lock'

      - name: Default filter outputs (non-PR)
        if: github.event_name != 'pull_request'
        id: defaults
        run: |
          echo "visualisation=true" >> "$GITHUB_OUTPUT"
          echo "train_models=true" >> "$GITHUB_OUTPUT"

  dvc-full-repro-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 12), f'Need Python 3.12.x, got {sys.version}'"

      - name: Install Poetry
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip poetry
          echo "$("$PYTHON_BIN" -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Configure DVC remote for local runner storage
        run: |
          poetry run dvc remote add --force --local local "$DVC_REMOTE_URL"

      - name: Pull DVC data
        run: |
          poetry run dvc pull

      - name: Reproduce full DVC pipeline
        env:
          EV_BUDDY_N_JOBS: "2"
        run: |
          poetry run dvc repro

      - name: Quality gate on model metrics
        env:
          REQUIRE_METRICS_FILES: "1"
        run: |
          poetry run pytest -v tests/quality/test_metrics_thresholds.py

  dvc-visualisation:
    needs:
      - changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      needs.changes.outputs.visualisation == 'true')
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 12), f'Need Python 3.12.x, got {sys.version}'"

      - name: Install Poetry
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip poetry
          echo "$("$PYTHON_BIN" -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Configure DVC remote for local runner storage
        run: |
          poetry run dvc remote add --force --local local "$DVC_REMOTE_URL"

      - name: Pull DVC data
        run: |
          poetry run dvc pull

      - name: Reproduce visualisation stage
        run: |
          poetry run dvc repro visualisation

  dvc-train-models:
    needs:
      - changes
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_train_models == 'true') ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      needs.changes.outputs.train_models == 'true')
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 12), f'Need Python 3.12.x, got {sys.version}'"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Configure DVC remote for local runner storage
        run: |
          poetry run dvc remote add --force --local local "$DVC_REMOTE_URL"

      - name: Pull DVC data
        run: |
          poetry run dvc pull

      - name: Reproduce train_models stage
        env:
          EV_BUDDY_N_JOBS: "2"
        run: |
          poetry run dvc repro train_models

      - name: Quality gate on model metrics
        env:
          REQUIRE_METRICS_FILES: "1"
        run: |
          poetry run pytest -v tests/quality/test_metrics_thresholds.py
