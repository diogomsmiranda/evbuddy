name: dvc

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_train_models:
        description: "Run full train_models stage after visualisation"
        required: false
        default: false
        type: boolean
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened

env:
  PYTHON_BIN: /home/igo/.pyenv/shims/python3.12
  DVC_REMOTE_URL: /srv/dvc/evbuddy

jobs:
  dvc-full-repro-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 12), f'Need Python 3.12.x, got {sys.version}'"

      - name: Install Poetry
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip poetry
          echo "$("$PYTHON_BIN" -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Configure DVC remote for local runner storage
        run: |
          poetry run dvc remote modify --local local url "$DVC_REMOTE_URL"

      - name: Pull DVC data
        run: |
          poetry run dvc pull

      - name: Reproduce full DVC pipeline
        run: |
          poetry run dvc repro

      - name: Quality gate on model metrics
        env:
          REQUIRE_METRICS_FILES: "1"
        run: |
          poetry run pytest -v tests/quality/test_metrics_thresholds.py

  dvc-visualisation:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'full-train')
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 12), f'Need Python 3.12.x, got {sys.version}'"

      - name: Install Poetry
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip poetry
          echo "$("$PYTHON_BIN" -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Configure DVC remote for local runner storage
        run: |
          poetry run dvc remote modify --local local url "$DVC_REMOTE_URL"

      - name: Pull DVC data
        run: |
          poetry run dvc pull

      - name: Reproduce visualisation stage
        run: |
          poetry run dvc repro visualisation

  dvc-train-models:
    needs:
      - dvc-visualisation
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.run_train_models == 'true') || contains(github.event.pull_request.labels.*.name, 'full-train')
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python runtime
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 12), f'Need Python 3.12.x, got {sys.version}'"

      - name: Install Poetry
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip poetry
          echo "$("$PYTHON_BIN" -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Verify Poetry
        run: |
          poetry --version

      - name: Install dependencies
        run: |
          poetry env use "$PYTHON_BIN"
          poetry install --with dev --no-interaction --no-root

      - name: Configure DVC remote for local runner storage
        run: |
          poetry run dvc remote modify --local local url "$DVC_REMOTE_URL"

      - name: Pull DVC data
        run: |
          poetry run dvc pull

      - name: Reproduce train_models stage
        run: |
          poetry run dvc repro train_models

      - name: Quality gate on model metrics
        env:
          REQUIRE_METRICS_FILES: "1"
        run: |
          poetry run pytest -v tests/quality/test_metrics_thresholds.py
