stages:
  json_to_csv:
    cmd: poetry run python -m src.data.json_to_csv
    deps:
      - src/data/json_to_csv.py
      - src/utils/utils.py
      - data/raw/opendata_datasets_json
    outs:
      - data/raw/opendata_datasets_csv

  derive_opening_hours:
    cmd: poetry run python -m src.visualisation.granularity
    deps:
      - src/visualisation/granularity.py
      - src/utils/utils.py
      - data/raw/opendata_datasets_csv
    outs:
      - data/interim/oh_opendata_datasets_csv

  concat_locations:
    cmd: poetry run python -m src.data.concat_csv
    deps:
      - src/data/concat_csv.py
      - src/utils/utils.py
      - data/raw/opendata_datasets_csv
      - data/interim/oh_opendata_datasets_csv
    outs:
      - data/interim/locations.csv

  extract_stations:
    cmd: poetry run python -m src.data.extract_nested stations
    deps:
      - src/data/extract_nested.py
      - src/utils/utils.py
      - data/interim/locations.csv
    outs:
      - data/interim/stations.csv

  extract_ports:
    cmd: poetry run python -m src.data.extract_nested ports
    deps:
      - src/data/extract_nested.py
      - src/utils/utils.py
      - data/interim/stations.csv
    outs:
      - data/interim/ports.csv

  build_timeseries:
    cmd: poetry run python -m src.data.build_features
    deps:
      - src/data/build_features.py
      - src/utils/utils.py
      - data/interim/locations.csv
      - data/interim/stations.csv
      - data/interim/ports.csv
    outs:
      - data/interim/features/stations_timeseries.csv

  feature_encoding:
    cmd: poetry run python -m src.features.feature_encoding
    deps:
      - src/features/feature_encoding.py
      - src/utils/utils.py
      - data/interim/features/stations_timeseries.csv
    outs:
      - data/interim/features/stations_timeseries_encoded.csv

  feature_selection:
    cmd: poetry run python -m src.features.feature_selection
    deps:
      - src/features/feature_selection.py
      - src/utils/utils.py
      - data/interim/features/stations_timeseries_encoded.csv
    outs:
      - data/interim/features/stations_timeseries_selected.csv

  visualisation:
    cmd: |
      poetry run python -m src.visualisation.sparsity
      poetry run python -m src.visualisation.distributions timeseries
      poetry run python -m src.visualisation.dimensionality timeseries
    deps:
      - src/visualisation/sparsity.py
      - src/visualisation/distributions.py
      - src/visualisation/dimensionality.py
      - src/utils/__init__.py
      - src/utils/utils.py
      - data/interim/features/stations_timeseries_encoded.csv
      - data/interim/features/stations_timeseries_selected.csv
    plots:
      - reports/figures/sparsity/records_per_day.png
      - reports/figures/sparsity/records_per_day_full.png
      - reports/figures/dimensionality/interim/timeseries/stations_timeseries_encoded_records_variables.png
      - reports/figures/dimensionality/interim/timeseries/stations_timeseries_encoded_missing_values.png
      - reports/figures/distributions/interim/stations_timeseries_selected/unavailable_rate.png
      - reports/figures/distributions/interim/stations_timeseries_selected/available_ports.png
      - reports/figures/distributions/interim/stations_timeseries_selected/snapshot_ts.png
      - reports/figures/distributions/interim/stations_timeseries_selected/total_ports.png
      - reports/figures/distributions/interim/stations_timeseries_selected/has_dc_fast.png

  feature_transform:
    cmd: poetry run python -m src.features.feature_transform
    deps:
      - src/features/feature_transform.py
      - src/utils/utils.py
      - data/interim/features/stations_timeseries_selected.csv
    outs:
      - data/processed

  train_models:
    cmd: poetry run python -m src.models.train_models
    deps:
      - src/models/train_models.py
      - src/utils/utils.py
      - data/processed
    outs:
      - models/xgb_occupied_h10m.json
      - models/xgb_occupied_h20m.json
      - models/xgb_occupied_h30m.json
      - models/metrics_h10m.json
      - models/metrics_h20m.json
      - models/metrics_h30m.json
